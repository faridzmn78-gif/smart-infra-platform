name: Backend Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: smart_infra

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U admin -d smart_infra"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://admin:admin123@localhost:5432/smart_infra

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx psycopg2-binary

      - name: Wait for PostgreSQL
        run: |
          sleep 20

      - name: Initialize Database
        run: |
          cd backend
          python init_db.py

      - name: Run Tests
        run: |
          cd backend
          pytest -v