name: Backend Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: smart_infra

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U admin -d smart_infra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://admin:admin123@localhost:5432/smart_infra

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary pytest httpx

      - name: Wait for PostgreSQL
        run: |
          sleep 20

      - name: Create Tables
        run: |
          cd backend
          python init_db.py

      - name: Verify Tables
        run: |
          cd backend
          python -c "
from app.database.db import engine
from sqlalchemy import text

with engine.connect() as conn:
    result = conn.execute(
        text(\"SELECT table_name FROM information_schema.tables WHERE table_schema='public'\")
    )

    print('TABLES FOUND:')
    print(list(result))
"

      - name: Run Tests
        run: |
          cd backend
          pytest -v